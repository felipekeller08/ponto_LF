<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#003366" />
  <title>Controle de Ponto - Agência LF</title>

  <!-- Estilos -->
  <link rel="stylesheet" href="style.css" />

  <!-- Manifesto PWA -->
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#003366" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">


<body>
  <div class="container">
    <h1>Controle de Ponto - Agência LF</h1>

    <label for="usuario">Quem está trabalhando?</label>
    <select id="usuario">
      <option value="Lucas">Lucas</option>
      <option value="Felipe">Felipe</option>
    </select>

    <label for="tarefa">Nome da Tarefa</label>
    <input type="text" id="tarefa" placeholder="Ex: Post Instagram" />

    <div class="botoes">
      <button id="startBtn">Iniciar</button>
      <button id="stopBtn" disabled>Finalizar</button>
    </div>

    <h2 id="cronometro">00:00:00</h2>

    <!-- TABELA RESPONSIVA -->
    <div class="table-container">
      <table id="registros">
        <thead>
          <tr>
            <th>Usuário</th>
            <th>Tarefa</th>
            <th>Data</th>
            <th>Início</th>
            <th>Fim</th>
            <th>Duração</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- TEMPO TOTAL -->
    <h2>⏱️ Tempo Total Trabalhado</h2>
    <div class="tempo-total">
      <div><strong>Lucas:</strong> <span id="tempoLucas">00:00:00</span></div>
      <div><strong>Felipe:</strong> <span id="tempoFelipe">00:00:00</span></div>
    </div>

    <!-- LISTA DE TAREFAS -->
    <div class="secao-tarefas">
      <h2>📋 Lista de Tarefas Pendentes</h2>

      <div class="nova-tarefa">
        <input type="text" id="nomeTarefa" placeholder="Ex: 5 posts para o Instagram" />
        <input type="date" id="dataTarefa" />
        <select id="responsavel">
          <option value="Lucas">Lucas</option>
          <option value="Felipe">Felipe</option>
        </select>
        <button id="adicionarTarefa">Adicionar</button>
      </div>

      <div class="listas">
        <div>
          <h3 class="titulo-lucas">LUCAS</h3>
          <ul id="listaLucas"></ul>
        </div>
        <div>
          <h3 class="titulo-felipe">FELIPE</h3>
          <ul id="listaFelipe"></ul>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log("✅ Service Worker registrado com sucesso!"))
        .catch(err => console.error("❌ Falha ao registrar Service Worker:", err));
    }
  </script>
</body>
</html>
